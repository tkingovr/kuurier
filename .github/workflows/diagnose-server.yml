name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Explore server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          script: |
            set +e
            echo "=== Current user and home ==="
            whoami
            echo "HOME=$HOME"
            pwd

            echo ""
            echo "=== Home directory contents ==="
            ls -la "$HOME"

            echo ""
            echo "=== Looking for docker-compose.prod.yml anywhere ==="
            find / -name "docker-compose.prod.yml" -type f 2>/dev/null | head -20

            echo ""
            echo "=== Looking for Dockerfile anywhere (excluding /proc, /sys, /var/lib/docker) ==="
            find / -name "Dockerfile" -type f -not -path "/proc/*" -not -path "/sys/*" -not -path "/var/lib/docker/*" 2>/dev/null | head -20

            echo ""
            echo "=== Looking for kuurier git repo ==="
            find / -type d -name "kuurier" 2>/dev/null | head -20
            find / -type d -name ".git" 2>/dev/null | grep -i kuu | head -20

            echo ""
            echo "=== Running docker containers ==="
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== Docker container working dirs ==="
            for container in $(docker ps --format "{{.Names}}"); do
              echo "--- $container ---"
              docker inspect "$container" --format '  Image: {{.Config.Image}}' 2>/dev/null
              docker inspect "$container" --format '  WorkingDir: {{.Config.WorkingDir}}' 2>/dev/null
              docker inspect "$container" --format '  Mounts: {{range .Mounts}}{{.Source}} -> {{.Destination}} {{end}}' 2>/dev/null
            done

            echo ""
            echo "=== /opt contents ==="
            ls -la /opt 2>/dev/null || echo "(no /opt)"

            echo ""
            echo "=== /srv contents ==="
            ls -la /srv 2>/dev/null || echo "(no /srv)"

            echo ""
            echo "=== /root contents (if accessible) ==="
            ls -la /root 2>/dev/null || echo "(not accessible)"

            echo ""
            echo "=== API container image build time ==="
            docker inspect kuurier-api-blue --format 'Created: {{.Created}}' 2>/dev/null
            docker inspect kuurier-api-green --format 'Created: {{.Created}}' 2>/dev/null

            echo ""
            echo "=== DB tables (checking if bot tables exist) ==="
            docker exec kuurier-postgres psql -U kuurier -d kuurier -c "\dt" 2>&1 | grep -E "bot_|events" || echo "(failed to connect or no tables)"
