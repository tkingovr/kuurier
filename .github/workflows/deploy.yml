name: Deploy

on:
  # Auto-deploy when pushing to main
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'

  # Manual deployment trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Encode PRODUCTION_ENV for transport
        id: encode_env
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          # If the secret isn't set yet, pass an empty value and the
          # server-side script will fall back to its legacy recovery path.
          # After the secret is added and one deploy is verified, the
          # fallback can be removed (Phase 1.5 task 3).
          if [ -z "${PRODUCTION_ENV:-}" ]; then
            echo "PROD_ENV_B64=" >> "$GITHUB_ENV"
            echo "::notice::PRODUCTION_ENV secret is not set — deploy will use legacy container-introspection fallback. Set it per docs/SECRETS.md."
          else
            B64=$(printf '%s' "$PRODUCTION_ENV" | base64 -w0)
            # Mask the base64 form so it can't leak into logs even if echoed.
            echo "::add-mask::$B64"
            echo "PROD_ENV_B64=$B64" >> "$GITHUB_ENV"
          fi

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_REPO: ${{ github.repository }}
          DEPLOY_BUILD_DATE: ${{ github.event.repository.updated_at }}
          PROD_ENV_B64: ${{ env.PROD_ENV_B64 }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          # NOTE: do NOT enable script_stop — it aborts on any non-zero
          # exit status, including from `[ ... ]` tests inside an `if`
          # construct (which the shell is supposed to consume). We rely
          # on `set -e` in the script instead, which correctly respects
          # if/else/while semantics.
          envs: DEPLOY_SHA,DEPLOY_BRANCH,DEPLOY_REPO,DEPLOY_BUILD_DATE,PROD_ENV_B64
          script: |
            set -e

            DEPLOY_DIR="$HOME/kuurier"
            STAGE_DIR=$(mktemp -d -t kuurier-deploy-XXXXXX)

            echo "=== Cloning latest code into $STAGE_DIR (sha=$DEPLOY_SHA) ==="
            git clone --depth 1 --branch "$DEPLOY_BRANCH" "https://github.com/${DEPLOY_REPO}.git" "$STAGE_DIR/repo"

            echo "=== Writing .env from PRODUCTION_ENV secret ==="
            # PROD_ENV_B64 is the canonical source of truth. Fail loudly
            # if it's missing — no more container-introspection fallback.
            # See docs/SECRETS.md for rotation and recovery procedures.
            if [ -z "${PROD_ENV_B64:-}" ]; then
              echo "ERROR: PRODUCTION_ENV GitHub Actions secret is not set."
              echo "Set it per docs/SECRETS.md — the deploy cannot proceed without it."
              exit 1
            fi

            # Write atomically so a failed decode never leaves .env empty.
            umask 077
            echo "$PROD_ENV_B64" | base64 -d > "$DEPLOY_DIR/.env.new"
            chmod 600 "$DEPLOY_DIR/.env.new"
            mv "$DEPLOY_DIR/.env.new" "$DEPLOY_DIR/.env"
            echo ".env written from GitHub secret ($(wc -l < "$DEPLOY_DIR/.env") lines)"

            # Verify all required keys are present in what the user supplied.
            for k in DB_PASSWORD REDIS_PASSWORD JWT_SECRET ENCRYPTION_KEY CORS_ALLOWED_ORIGINS; do
              if ! grep -q "^${k}=" "$DEPLOY_DIR/.env"; then
                echo "ERROR: required key $k missing from PRODUCTION_ENV"
                exit 1
              fi
            done

            echo "=== Syncing server/ contents into $DEPLOY_DIR ==="
            rsync -a --delete \
              --exclude='.env' \
              --exclude='.env.*' \
              --exclude='certs/' \
              --exclude='certbot-webroot/' \
              --exclude='webapp-build/' \
              "$STAGE_DIR/repo/server/" "$DEPLOY_DIR/"

            rm -rf "$STAGE_DIR"

            cd "$DEPLOY_DIR"

            echo "=== Running tracked migrations ==="
            PSQL="docker exec -i kuurier-postgres psql -U kuurier -d kuurier -v ON_ERROR_STOP=1"

            # 1. Ensure the tracking table exists.
            echo "CREATE TABLE IF NOT EXISTS schema_migrations (version VARCHAR(255) PRIMARY KEY, applied_at TIMESTAMPTZ DEFAULT NOW());" | $PSQL > /dev/null

            # 2. One-time bootstrap: if the table is empty but the DB already
            # has real tables (e.g. existing prod DB that predates migration
            # tracking), mark every migration file as already-applied rather
            # than trying to re-run them against a populated schema.
            APPLIED_COUNT=$(docker exec -i kuurier-postgres psql -U kuurier -d kuurier -tAc "SELECT COUNT(*) FROM schema_migrations")
            USERS_TABLE_EXISTS=$(docker exec -i kuurier-postgres psql -U kuurier -d kuurier -tAc "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name='users'")

            if [ "$APPLIED_COUNT" = "0" ] && [ "$USERS_TABLE_EXISTS" = "1" ]; then
              echo "  [bootstrap] schema_migrations empty but DB has existing tables — marking all known migrations as applied"
              for migration in migrations/[0-9]*.sql; do
                [ -f "$migration" ] || continue
                version=$(basename "$migration" .sql)
                echo "INSERT INTO schema_migrations (version) VALUES ('$version') ON CONFLICT DO NOTHING;" | $PSQL > /dev/null
                echo "    backfilled: $version"
              done
            fi

            # 3. Apply any pending migrations (not yet in schema_migrations).
            APPLIED=$(docker exec -i kuurier-postgres psql -U kuurier -d kuurier -tAc "SELECT version FROM schema_migrations ORDER BY version")
            PENDING=0
            for migration in migrations/[0-9]*.sql; do
              [ -f "$migration" ] || continue
              version=$(basename "$migration" .sql)
              if echo "$APPLIED" | grep -qx "$version"; then
                continue
              fi
              PENDING=$((PENDING + 1))
              echo "  [apply] $version"
              # Wrap migration + tracking insert in a single transaction so a
              # failure rolls back both.
              (
                echo "BEGIN;"
                cat "$migration"
                echo "INSERT INTO schema_migrations (version) VALUES ('$version');"
                echo "COMMIT;"
              ) | $PSQL
            done

            if [ "$PENDING" = "0" ]; then
              echo "  No pending migrations."
            else
              echo "  Applied $PENDING migration(s)."
            fi

            echo "=== Building image (sha=$DEPLOY_SHA) ==="
            BUILD_DATE="${DEPLOY_BUILD_DATE:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
            docker build --no-cache \
              --build-arg GIT_SHA="$DEPLOY_SHA" \
              --build-arg VERSION="$DEPLOY_BRANCH" \
              --build-arg BUILD_DATE="$BUILD_DATE" \
              -t kuurier-server:latest .

            echo "=== Restarting API containers ==="
            docker compose -f docker-compose.prod.yml up -d --force-recreate api-blue api-green

            echo "=== Waiting for health ==="
            sleep 15
            curl -sf http://localhost/health > /dev/null

            echo "=== Verifying deployed SHA matches $DEPLOY_SHA ==="
            # Retry up to 10 times (20s total) in case the new container is still warming up
            ATTEMPT=0
            RUNNING_SHA=""
            VERSION_BODY=""
            while [ $ATTEMPT -lt 10 ]; do
              # Try via nginx (public path) first, fall back to direct container access
              VERSION_BODY=$(curl -s -L http://localhost/api/v1/version 2>&1 || true)
              if [ -z "$VERSION_BODY" ] || echo "$VERSION_BODY" | grep -q "<html"; then
                # nginx may strip /api or route to a different service; try direct
                VERSION_BODY=$(docker exec kuurier-api-blue wget -qO- http://localhost:8080/api/v1/version 2>&1 || true)
              fi
              RUNNING_SHA=$(echo "$VERSION_BODY" | sed -n 's/.*"sha":"\([^"]*\)".*/\1/p')
              if [ "$RUNNING_SHA" = "$DEPLOY_SHA" ]; then
                break
              fi
              ATTEMPT=$((ATTEMPT + 1))
              sleep 2
            done

            if [ "$RUNNING_SHA" != "$DEPLOY_SHA" ]; then
              echo "ERROR: deployed SHA mismatch"
              echo "  Expected: $DEPLOY_SHA"
              echo "  Running:  $RUNNING_SHA"
              echo "  Response body: $VERSION_BODY"
              echo ""
              echo "=== Container status ==="
              docker ps --filter name=kuurier-api --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
              echo ""
              echo "=== Last 40 lines from kuurier-api-blue ==="
              docker logs --tail 40 kuurier-api-blue 2>&1 || true
              echo ""
              echo "=== Last 40 lines from kuurier-api-green ==="
              docker logs --tail 40 kuurier-api-green 2>&1 || true
              exit 1
            fi

            echo "=== Deployment successful: running sha=$RUNNING_SHA ==="

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed! Check the logs above."
