name: Deploy

on:
  # Auto-deploy when pushing to main
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'

  # Manual deployment trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_REPO: ${{ github.repository }}
          DEPLOY_BUILD_DATE: ${{ github.event.repository.updated_at }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          script_stop: true
          envs: DEPLOY_SHA,DEPLOY_BRANCH,DEPLOY_REPO,DEPLOY_BUILD_DATE
          script: |
            set -e

            DEPLOY_DIR="$HOME/kuurier"
            STAGE_DIR=$(mktemp -d -t kuurier-deploy-XXXXXX)

            echo "=== Cloning latest code into $STAGE_DIR (sha=$DEPLOY_SHA) ==="
            git clone --depth 1 --branch "$DEPLOY_BRANCH" "https://github.com/${DEPLOY_REPO}.git" "$STAGE_DIR/repo"

            echo "=== Ensuring .env has all required keys ==="
            touch "$DEPLOY_DIR/.env"
            chmod 600 "$DEPLOY_DIR/.env"

            # Pull env vars from the running containers and append any missing ones
            TMP_ENV=$(mktemp)
            docker inspect kuurier-api-blue --format '{{range .Config.Env}}{{println .}}{{end}}' > "$TMP_ENV.api"
            docker inspect kuurier-postgres --format '{{range .Config.Env}}{{println .}}{{end}}' > "$TMP_ENV.pg"

            add_if_missing() {
              NAME=$1
              VAL=$2
              if [ -n "$VAL" ] && ! grep -q "^$NAME=" "$DEPLOY_DIR/.env"; then
                printf '%s=%s\n' "$NAME" "$VAL" >> "$DEPLOY_DIR/.env"
                echo "  + recovered $NAME"
              fi
            }

            for key in JWT_SECRET ENCRYPTION_KEY CORS_ALLOWED_ORIGINS BLUE_VERSION GREEN_VERSION; do
              val=$(grep "^${key}=" "$TMP_ENV.api" | head -1 | cut -d= -f2-)
              add_if_missing "$key" "$val"
            done

            add_if_missing DB_USER "$(grep '^POSTGRES_USER=' "$TMP_ENV.pg" | cut -d= -f2-)"
            add_if_missing DB_NAME "$(grep '^POSTGRES_DB=' "$TMP_ENV.pg" | cut -d= -f2-)"
            add_if_missing DB_PASSWORD "$(grep '^POSTGRES_PASSWORD=' "$TMP_ENV.pg" | cut -d= -f2-)"

            REDIS_URL_LINE=$(grep '^REDIS_URL=' "$TMP_ENV.api" | head -1 | cut -d= -f2-)
            REDIS_PASS=$(echo "$REDIS_URL_LINE" | sed -n 's|^redis://[^:]*:\([^@]*\)@.*|\1|p')
            add_if_missing REDIS_PASSWORD "$REDIS_PASS"

            rm -f "$TMP_ENV" "$TMP_ENV.api" "$TMP_ENV.pg"

            # Verify required keys are present
            for k in DB_PASSWORD REDIS_PASSWORD JWT_SECRET ENCRYPTION_KEY CORS_ALLOWED_ORIGINS; do
              if ! grep -q "^${k}=" "$DEPLOY_DIR/.env"; then
                echo "ERROR: required key $k missing from .env"
                exit 1
              fi
            done
            echo ".env has $(wc -l < "$DEPLOY_DIR/.env") entries"

            echo "=== Syncing server/ contents into $DEPLOY_DIR ==="
            rsync -a --delete \
              --exclude='.env' \
              --exclude='.env.*' \
              --exclude='certs/' \
              --exclude='certbot-webroot/' \
              --exclude='webapp-build/' \
              "$STAGE_DIR/repo/server/" "$DEPLOY_DIR/"

            rm -rf "$STAGE_DIR"

            cd "$DEPLOY_DIR"

            echo "=== Applying pending migrations ==="
            for migration in migrations/010_*.sql migrations/011_*.sql migrations/012_*.sql migrations/013_*.sql; do
              if [ -f "$migration" ]; then
                echo "Applying $migration"
                docker exec -i kuurier-postgres psql -U kuurier -d kuurier -v ON_ERROR_STOP=1 < "$migration"
              fi
            done

            echo "=== Building image (sha=$DEPLOY_SHA) ==="
            BUILD_DATE="${DEPLOY_BUILD_DATE:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
            docker build --no-cache \
              --build-arg GIT_SHA="$DEPLOY_SHA" \
              --build-arg VERSION="$DEPLOY_BRANCH" \
              --build-arg BUILD_DATE="$BUILD_DATE" \
              -t kuurier-server:latest .

            echo "=== Restarting API containers ==="
            docker compose -f docker-compose.prod.yml up -d --force-recreate api-blue api-green

            echo "=== Waiting for health ==="
            sleep 15
            curl -sf http://localhost/health > /dev/null

            echo "=== Verifying deployed SHA matches $DEPLOY_SHA ==="
            # Retry up to 10 times (20s total) in case the new container is still warming up
            ATTEMPT=0
            RUNNING_SHA=""
            VERSION_BODY=""
            while [ $ATTEMPT -lt 10 ]; do
              # Try via nginx (public path) first, fall back to direct container access
              VERSION_BODY=$(curl -s -L http://localhost/api/v1/version 2>&1 || true)
              if [ -z "$VERSION_BODY" ] || echo "$VERSION_BODY" | grep -q "<html"; then
                # nginx may strip /api or route to a different service; try direct
                VERSION_BODY=$(docker exec kuurier-api-blue wget -qO- http://localhost:8080/api/v1/version 2>&1 || true)
              fi
              RUNNING_SHA=$(echo "$VERSION_BODY" | sed -n 's/.*"sha":"\([^"]*\)".*/\1/p')
              if [ "$RUNNING_SHA" = "$DEPLOY_SHA" ]; then
                break
              fi
              ATTEMPT=$((ATTEMPT + 1))
              sleep 2
            done

            if [ "$RUNNING_SHA" != "$DEPLOY_SHA" ]; then
              echo "ERROR: deployed SHA mismatch"
              echo "  Expected: $DEPLOY_SHA"
              echo "  Running:  $RUNNING_SHA"
              echo "  Response body: $VERSION_BODY"
              exit 1
            fi

            echo "=== Deployment successful: running sha=$RUNNING_SHA ==="

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed! Check the logs above."
