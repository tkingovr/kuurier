name: Deploy

on:
  # Auto-deploy when pushing to main
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'

  # Manual deployment trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIR="$HOME/kuurier"
            STAGE_DIR="$(mktemp -d -t kuurier-deploy-XXXXXX)"
            trap 'rm -rf "$STAGE_DIR"' EXIT

            echo "=== Cloning latest code into $STAGE_DIR ==="
            git clone --depth 1 --branch "${{ github.ref_name }}" https://github.com/${{ github.repository }}.git "$STAGE_DIR/repo"

            echo "=== Ensuring .env has all required keys ==="
            REQUIRED_KEYS="DB_PASSWORD REDIS_PASSWORD JWT_SECRET ENCRYPTION_KEY CORS_ALLOWED_ORIGINS"
            touch "$DEPLOY_DIR/.env"
            chmod 600 "$DEPLOY_DIR/.env"

            has_key() { grep -q "^$1=" "$DEPLOY_DIR/.env"; }
            add_key() {
              if [ -n "$2" ] && ! has_key "$1"; then
                echo "$1=$2" >> "$DEPLOY_DIR/.env"
                echo "  + recovered $1"
              fi
            }

            # App-level secrets from api-blue
            docker inspect kuurier-api-blue --format '{{range .Config.Env}}{{println .}}{{end}}' | while IFS= read -r line; do
              KEY="${line%%=*}"
              VAL="${line#*=}"
              case "$KEY" in
                JWT_SECRET|ENCRYPTION_KEY|CORS_ALLOWED_ORIGINS|BLUE_VERSION|GREEN_VERSION|APNS_*|MINIO_*)
                  add_key "$KEY" "$VAL"
                  ;;
              esac
            done

            # DB credentials from postgres container
            docker inspect kuurier-postgres --format '{{range .Config.Env}}{{println .}}{{end}}' | while IFS= read -r line; do
              case "$line" in
                POSTGRES_USER=*) add_key "DB_USER" "${line#POSTGRES_USER=}" ;;
                POSTGRES_DB=*) add_key "DB_NAME" "${line#POSTGRES_DB=}" ;;
                POSTGRES_PASSWORD=*) add_key "DB_PASSWORD" "${line#POSTGRES_PASSWORD=}" ;;
              esac
            done

            # REDIS_PASSWORD from REDIS_URL in api-blue
            if ! has_key REDIS_PASSWORD; then
              REDIS_URL_RAW=$(docker inspect kuurier-api-blue --format '{{range .Config.Env}}{{println .}}{{end}}' | grep '^REDIS_URL=' | head -1 || true)
              REDIS_URL="${REDIS_URL_RAW#REDIS_URL=}"
              REDIS_PASS=$(echo "$REDIS_URL" | sed -n 's|^redis://[^:]*:\([^@]*\)@.*|\1|p')
              add_key "REDIS_PASSWORD" "$REDIS_PASS"
            fi

            # Report status
            echo ".env now has $(wc -l < "$DEPLOY_DIR/.env") entries"
            MISSING=""
            for k in $REQUIRED_KEYS; do
              has_key "$k" || MISSING="$MISSING $k"
            done
            if [ -n "$MISSING" ]; then
              echo "ERROR: Still missing required keys:$MISSING"
              exit 1
            fi

            echo "=== Syncing server/ contents into $DEPLOY_DIR ==="
            # Preserve runtime-only files/dirs that aren't in the repo
            # (secrets, certs, build artifacts). Everything else gets updated.
            rsync -a --delete \
              --exclude='.env' \
              --exclude='.env.*' \
              --exclude='certs/' \
              --exclude='certbot-webroot/' \
              --exclude='webapp-build/' \
              "$STAGE_DIR/repo/server/" "$DEPLOY_DIR/"

            cd "$DEPLOY_DIR"

            echo "=== Applying pending migrations ==="
            # The DB was initialized 6+ weeks ago with an older complete_schema
            # that did not include 010-013. All of these are idempotent.
            for migration in migrations/010_*.sql migrations/011_*.sql migrations/012_*.sql migrations/013_*.sql; do
              if [ -f "$migration" ]; then
                echo "Applying $migration"
                docker exec -i kuurier-postgres psql -U "${DB_USER:-kuurier}" -d "${DB_NAME:-kuurier}" -v ON_ERROR_STOP=1 < "$migration"
              fi
            done

            echo "=== Building image ==="
            docker build --no-cache -t kuurier-server:latest .

            echo "=== Restarting API containers ==="
            docker compose -f docker-compose.prod.yml up -d --force-recreate api-blue api-green

            echo "=== Waiting for health ==="
            sleep 15
            curl -sf http://localhost/health

            echo "=== Deployment successful ==="

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed! Check the logs above."
